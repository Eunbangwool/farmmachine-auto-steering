name: Release AutoSteer APK (versioned)

# v* 태그를 푸시하면 APK 를 빌드해 버전 릴리스(정식, latest)로 발행한다.
# (롤링 디버그는 build-autosteer-apk.yml 가 매 push 마다 별도로 갱신)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # Releases 발행에 필요

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: assembleDebug → 버전 릴리스
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 실행권한
        run: chmod +x gradlew

      - name: 빌드 (assembleDebug)
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: APK 버전명으로 정리
        run: |
          mkdir -p dist
          src=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          cp "$src" "dist/farmmachine-autosteer-${GITHUB_REF_NAME}.apk"
          ls -l dist

      - name: 버전 릴리스 발행
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AutoSteer ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          body: |
            팜머신 자율조향 앱 — **${{ github.ref_name }}** (디버그 서명, 태블릿 사이드로드용)

            **포함**
            - A 정본 코어 + 실모터 **Keya KY170** CanSpec(250k 속도제어) 이식
            - **멀티벤더(제조사 선택)**: AGMO ✅ / CHCNAV·FJD ★(GNSS만, 모터 CAN 미확정 → 조향 비활성)
            - GNSS 이중화(PA-3 + F9P), SITL 안전 6/6 검증

            **설치**: 태블릿에서 아래 APK 다운로드 → "출처를 알 수 없는 앱" 허용 후 설치.
            ⚠ 디버그 키 서명입니다(스토어 배포용 아님). 첫 실행 시 제조사를 선택하세요.

            - commit: `${{ github.sha }}`
          files: dist/*.apk
